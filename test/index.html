<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>我的主页</title>
    <!-- 引入 marked.js 用于解析 Markdown -->
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
        body { font-family: sans-serif; padding: 20px; }
        #loading { color: grey; }
        #error { color: red; }
        /* 为 Markdown 内容添加一些基本样式 */
        .markdown-content h1,
        .markdown-content h2,
        .markdown-content h3 { margin-top: 1em; margin-bottom: 0.5em; }
        .markdown-content p { margin-bottom: 1em; line-height: 1.6; }
        .markdown-content ul,
        .markdown-content ol { margin-left: 2em; margin-bottom: 1em; }
        .markdown-content code { background-color: #f0f0f0; padding: 0.2em 0.4em; border-radius: 3px; }
        .markdown-content pre code { display: block; padding: 1em; background-color: #f5f5f5; border-radius: 4px; }
    </style>
</head>
<body>

    <h1>主页内容</h1>

    <div id="homepage-content">
        <p id="loading">正在加载主页数据...</p>
        <h2 id="homepage-title" style="display: none;"></h2>
        <!-- 修改: 使用 div 来容纳渲染后的 Markdown HTML -->
        <div id="homepage-main-content" class="markdown-content" style="display: none;"></div>
    </div>

    <div id="error" style="display: none;">
        <p>加载数据时出错。</p>
        <pre id="error-message"></pre>
    </div>

    <script>

        // 获取用于显示内容的 HTML 元素
        const loadingElement = document.getElementById('loading');
        const titleElement = document.getElementById('homepage-title');
        const contentElement = document.getElementById('homepage-main-content');
        const errorContainer = document.getElementById('error');
        const errorMessageElement = document.getElementById('error-message');

        addEventListener('DOMContentLoaded', (event) => {
            // Strapi API 的 URL
            const strapiUrl = 'http://localhost:1337';
            const homepageApiUrl = `${strapiUrl}/api/homepage?populate=*`; // 确保有 populate=*

            loadHomepageData(homepageApiUrl);
        }); 

        function renderMarkdown(markdownString) {
            // 定义自定义渲染器，处理 <em> 标签，防止和公式中的下标冲突
            const renderer = {em({ tokens }) {
                    const text = this.parser.parseInline(tokens);
                    return `_${text}_`;
                }
            };
            
            marked.use({renderer});

            try {
                // 解析 Markdown
                return marked.parse(markdownString || ''); // 确保传入非空字符串
            } catch (error) {
                console.error("Markdown 解析出错:", error);
                return `<p>Markdown 解析时发生错误。</p><pre>${markdownString}</pre>`;
            } finally {
                // 可选：如果希望此自定义渲染器不影响其他地方的 marked 调用，
                // 可以在这里重置 marked 的选项为默认值
                // marked.setOptions({ renderer: new marked.Renderer() });
            }
        }

        function loadHomepageData(Api) {
            fetch(Api)
            .then(response => {
                if (!response.ok) {
                    return response.text().then(text => {
                        throw new Error(`HTTP 错误! 状态码: ${response.status}\n响应体: ${text}`);
                    });
                }
                return response.json();
            })
            .then(apiResponse => {
                const data = apiResponse.data;

                if (data && typeof data === 'object') {

                    const title = data.Title || '默认标题';
                    const Content = data.Content || '';

                    // 更新标题和内容
                    titleElement.textContent = title;
                    contentElement.innerHTML = renderMarkdown(Content);

                    // 隐藏加载提示，显示内容
                    loadingElement.style.display = 'none';
                    titleElement.style.display = 'block';
                    contentElement.style.display = 'block';

                } else {
                    // 如果 data 不存在或不是对象
                    throw new Error('API 响应中缺少有效的 data 对象。检查控制台中的原始响应。');
                }
            })
            .catch(error => {
                console.error('处理主页数据时出错:', error);
                loadingElement.style.display = 'none';
                errorMessageElement.textContent = error.message;
                errorContainer.style.display = 'block';
            });
        }

    </script>

</body>
</html>
