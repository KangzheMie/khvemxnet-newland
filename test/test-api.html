<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Strapi API 测试</title>
    <style>
        body { font-family: sans-serif; padding: 20px; }
        #loading { color: grey; }
        #error { color: red; }
        pre {
            background-color: #f4f4f4;
            border: 1px solid #ddd;
            padding: 15px;
            white-space: pre-wrap; /* 允许长内容换行 */
            word-wrap: break-word; /* 强制单词换行 */
        }
    </style>
</head>
<body>

    <h1>测试 Strapi Homepage API</h1>
    <p>尝试从 <code>http://localhost:1337/api/homepage?populate=*</code> 获取数据。</p>

    <div id="api-response">
        <h2>API 响应:</h2>
        <p id="loading">正在加载数据...</p>
        <pre id="raw-json" style="display: none;"></pre>
    </div>

    <div id="error" style="display: none;">
        <h2>错误信息:</h2>
        <pre id="error-message"></pre>
    </div>

    <script>
        const strapiUrl = 'http://localhost:1337';
        const homepageApiUrl = `${strapiUrl}/api/categories`; // 确保添加 populate=*

        const loadingElement = document.getElementById('loading');
        const rawJsonElement = document.getElementById('raw-json');
        const errorContainer = document.getElementById('error');
        const errorMessageElement = document.getElementById('error-message');

        fetch(homepageApiUrl)
            .then(response => {
                // 先检查 HTTP 状态码
                if (!response.ok) {
                    // 如果状态码不是 2xx，也尝试读取响应体，因为 Strapi 可能在里面返回了错误详情
                    return response.text().then(text => {
                        throw new Error(`HTTP 错误! 状态码: ${response.status}\n响应体: ${text}`);
                    });
                }
                // 如果状态码 OK，解析 JSON
                return response.json();
            })
            .then(data => {
                // 将获取到的 JSON 数据格式化后显示在 <pre> 标签中
                rawJsonElement.textContent = JSON.stringify(data, null, 2); // null, 2 用于美化输出

                // 隐藏加载提示，显示 JSON 数据
                loadingElement.style.display = 'none';
                rawJsonElement.style.display = 'block';
            })
            .catch(error => {
                console.error('API 请求失败:', error);

                // 显示错误信息
                loadingElement.style.display = 'none';
                errorMessageElement.textContent = error.message; // 显示完整的错误信息，包括可能的响应体
                errorContainer.style.display = 'block';
            });
    </script>

</body>
</html>
