services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    ports:
      - "1337:1337"
    env_file:
      - backend/.env
    volumes:
      - strapi_data:/app/.tmp
      - strapi_uploads:/app/public/uploads
    networks:
      - strapi-net

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.nginx
    ports:
      - "8080:80"
    depends_on:
      - backend
    networks:
      - strapi-net

volumes:
  strapi_data:
  strapi_uploads:

networks:
  strapi-net:
    driver: bridge