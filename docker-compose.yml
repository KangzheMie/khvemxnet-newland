version: '3.8'

services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    ports:
      - "1337:1337"
    env_file:
      - backend/.env
    volumes:
      - strapi_data:/app/.tmp
    networks:
      - strapi-net

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.nginx
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - strapi-net

volumes:
  strapi_data:

networks:
  strapi-net:
    driver: bridge