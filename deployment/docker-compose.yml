version: '3.8'

services:
  postgres:
    container_name: newland-postgres
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: newland_db
      POSTGRES_USER: newland_user
      POSTGRES_PASSWORD: ${DB_PASSWORD:-newland_password}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init-db.sql:/docker-entrypoint-initdb.d/init-db.sql:ro
    ports:
      - "5432:5432"
    networks:
      - newland-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U newland_user -d newland_db"]
      interval: 30s
      timeout: 10s
      retries: 5
    restart: unless-stopped

  # Strapi后端服务
  backend:
    depends_on:
      postgres:
        condition: service_healthy
    build:
      context: ..
      dockerfile: backend/Dockerfile
    container_name: newland-backend
    environment:
      NODE_ENV: production
      HOST: 0.0.0.0
      PORT: 1337
      APP_KEYS: ${APP_KEYS:-your-app-keys-here}
      API_TOKEN_SALT: ${API_TOKEN_SALT:-your-api-token-salt}
      ADMIN_JWT_SECRET: ${ADMIN_JWT_SECRET:-your-admin-jwt-secret}
      TRANSFER_TOKEN_SALT: ${TRANSFER_TOKEN_SALT:-your-transfer-token-salt}
      JWT_SECRET: ${JWT_SECRET:-your-jwt-secret}
      
      # 数据库配置
      DATABASE_CLIENT: postgres
      DATABASE_HOST: postgres
      DATABASE_PORT: 5432
      DATABASE_NAME: newland_db
      DATABASE_USERNAME: newland_user
      DATABASE_PASSWORD: ${DB_PASSWORD:-newland_password}
      DATABASE_SSL: false
    volumes:
      - backend_uploads:/app/public/uploads
    ports:
      - "1337:1337"
    networks:
      - newland-network
    restart: unless-stopped

  # Nginx前端和反向代理
  nginx:
    build:
      context: ..
      dockerfile: deployment/Dockerfile.nginx
    container_name: newland-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - nginx_logs:/var/log/nginx
    depends_on:
      - backend
    networks:
      - newland-network
    restart: unless-stopped

  # Redis缓存服务
  redis:
    image: redis:7-alpine
    container_name: newland-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - newland-network
    restart: unless-stopped
    command: redis-server --appendonly yes

# 数据卷
volumes:
  postgres_data:
    driver: local
  backend_uploads:
    driver: local
  nginx_logs:
    driver: local
  redis_data:
    driver: local

# 网络
networks:
  newland-network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/16