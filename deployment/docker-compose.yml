services:
  # PostgreSQL数据库
  postgres:
    image: postgres:15-alpine
    container_name: newland2-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: newland2_db
      POSTGRES_USER: newland2_user
      POSTGRES_PASSWORD: ${DB_PASSWORD:-newland2_password}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ../backend/database/init:/docker-entrypoint-initdb.d
    ports:
      - "5432:5432"
    networks:
      - newland2-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U newland2_user -d newland2_db"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Strapi后端
  backend:
    build:
      context: ../backend
      dockerfile: Dockerfile
      args:
        - STRAPI_TELEMETRY_DISABLED=true
    container_name: newland2-backend
    restart: unless-stopped
    environment:
      NODE_ENV: production
      HOST: 0.0.0.0
      PORT: 1337
      APP_KEYS: ${APP_KEYS:-your-app-keys-here}
      API_TOKEN_SALT: ${API_TOKEN_SALT:-your-api-token-salt}
      ADMIN_JWT_SECRET: ${ADMIN_JWT_SECRET:-your-admin-jwt-secret}
      TRANSFER_TOKEN_SALT: ${TRANSFER_TOKEN_SALT:-your-transfer-token-salt}
      JWT_SECRET: ${JWT_SECRET:-your-jwt-secret}
      DATABASE_CLIENT: postgres
      DATABASE_HOST: postgres
      DATABASE_PORT: 5432
      DATABASE_NAME: newland2_db
      DATABASE_USERNAME: newland2_user
      DATABASE_PASSWORD: ${DB_PASSWORD:-newland2_password}
      DATABASE_SSL: false
    volumes:
      - uploads_data:/app/public/uploads
      - ../backend/config:/app/config
      - ../backend/src:/app/src
    ports:
      - "1337:1337"
    networks:
      - newland2-network
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:1337/_health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  # Nginx前端和反向代理
  nginx:
    build:
      context: .
      dockerfile: Dockerfile.nginx
    container_name: newland2-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ../frontend:/usr/share/nginx/html/frontend:ro
      - ../index.html:/usr/share/nginx/html/index.html:ro
      - ../favicon.ico:/usr/share/nginx/html/favicon.ico:ro
      - ssl_certs:/etc/nginx/ssl
    networks:
      - newland2-network
    depends_on:
      - backend
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost/"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Redis缓存 (可选)
  redis:
    image: redis:7-alpine
    container_name: newland2-redis
    restart: unless-stopped
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    networks:
      - newland2-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  postgres_data:
    driver: local
  uploads_data:
    driver: local
  redis_data:
    driver: local
  ssl_certs:
    driver: local

networks:
  newland2-network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/16